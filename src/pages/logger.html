<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UltraBlock — Network Logger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      padding: 0;
    }
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      background: #161b27;
      border-bottom: 1px solid #1e2332;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .toolbar h1 { font-size: 16px; font-weight: 700; color: #38bdf8; margin-right: 12px; }
    .toolbar input[type="text"] {
      background: #0f1117; border: 1px solid #334155; border-radius: 4px;
      color: #e2e8f0; padding: 5px 10px; font-size: 12px; width: 200px;
    }
    .toolbar select {
      background: #0f1117; border: 1px solid #334155; border-radius: 4px;
      color: #e2e8f0; padding: 5px 8px; font-size: 12px;
    }
    .toolbar button {
      background: #1e293b; border: 1px solid #334155; border-radius: 4px;
      color: #94a3b8; padding: 5px 12px; font-size: 12px; cursor: pointer;
    }
    .toolbar button:hover { background: #334155; color: #e2e8f0; }
    .toolbar button.active { background: #22c55e; color: #fff; border-color: #22c55e; }
    .toolbar button.danger { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }

    .stats-bar {
      background: #1a1f2e; padding: 6px 16px; border-bottom: 1px solid #1e2332;
      display: flex; gap: 20px; font-size: 11px; color: #64748b;
    }
    .stats-bar .stat { display: flex; gap: 4px; }
    .stats-bar .stat-value { color: #38bdf8; font-weight: 600; }

    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      background: #161b27; padding: 6px 10px; text-align: left;
      color: #64748b; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid #1e2332;
      position: sticky; top: 52px;
    }
    .log-table td {
      padding: 4px 10px; border-bottom: 1px solid #1e233244;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px;
    }
    .log-table tr:hover { background: #1e293b44; }
    .log-table tr.blocked td { color: #f87171; }
    .log-table tr.allowed td { color: #4ade80; }
    .log-table tr.redirected td { color: #60a5fa; }

    .badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 600;
    }
    .badge-blocked { background: #7f1d1d; color: #fca5a5; }
    .badge-allowed { background: #14532d; color: #86efac; }
    .badge-redirected { background: #1e3a5f; color: #93c5fd; }
    .badge-noop { background: #1e293b; color: #64748b; }

    .empty-state {
      text-align: center; padding: 60px; color: #475569;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>🔍 Network Logger</h1>
    <input type="text" id="filterInput" placeholder="Filter by URL or domain..." />
    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="script">Script</option>
      <option value="image">Image</option>
      <option value="stylesheet">CSS</option>
      <option value="xmlhttprequest">XHR</option>
      <option value="sub_frame">Frame</option>
      <option value="font">Font</option>
      <option value="media">Media</option>
      <option value="other">Other</option>
    </select>
    <select id="actionFilter">
      <option value="">All Actions</option>
      <option value="blocked">Blocked</option>
      <option value="allowed">Allowed</option>
      <option value="redirected">Redirected</option>
    </select>
    <button id="toggleBtn" class="active">● Recording</button>
    <button id="clearBtn" class="danger">Clear</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Total: <span class="stat-value" id="statTotal">0</span></div>
    <div class="stat">Blocked: <span class="stat-value" id="statBlocked">0</span></div>
    <div class="stat">Allowed: <span class="stat-value" id="statAllowed">0</span></div>
    <div class="stat">Redirected: <span class="stat-value" id="statRedirected">0</span></div>
  </div>

  <table class="log-table">
    <thead>
      <tr>
        <th style="width:70px">Time</th>
        <th style="width:80px">Action</th>
        <th style="width:80px">Type</th>
        <th style="width:150px">Domain</th>
        <th>URL</th>
        <th style="width:100px">Rule</th>
      </tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>

  <div class="empty-state" id="emptyState">
    <div class="icon">📡</div>
    <p>Logger is active. Network requests will appear here in real-time.</p>
    <p style="margin-top:8px; font-size:11px">Make sure to enable the logger from the toggle button above.</p>
  </div>

  <script>
  'use strict';
  (function () {
    var logBody = document.getElementById('logBody');
    var emptyState = document.getElementById('emptyState');
    var toggleBtn = document.getElementById('toggleBtn');
    var clearBtn = document.getElementById('clearBtn');
    var filterInput = document.getElementById('filterInput');
    var typeFilter = document.getElementById('typeFilter');
    var actionFilter = document.getElementById('actionFilter');

    var recording = true;
    var entries = [];
    var maxEntries = 2000;

    function sendMsg(msg) {
      return new Promise(function (resolve) {
        chrome.runtime.sendMessage(msg, function (resp) { resolve(resp); });
      });
    }

    function formatTime(ts) {
      var d = new Date(ts);
      return d.toTimeString().substring(0, 8);
    }

    function actionBadge(action) {
      var cls = 'badge-noop';
      var label = action || 'unknown';
      if (action === 'blocked' || action === 'block') { cls = 'badge-blocked'; label = 'BLOCKED'; }
      else if (action === 'allowed' || action === 'allow') { cls = 'badge-allowed'; label = 'ALLOWED'; }
      else if (action === 'redirected' || action === 'redirect') { cls = 'badge-redirected'; label = 'REDIRECT'; }
      return '<span class="badge ' + cls + '">' + label + '</span>';
    }

    function getDomain(url) {
      try { return new URL(url).hostname; } catch (e) { return ''; }
    }

    function matchesFilter(entry) {
      var text = filterInput.value.toLowerCase();
      var type = typeFilter.value;
      var action = actionFilter.value;
      if (text && (entry.url || '').toLowerCase().indexOf(text) === -1 &&
          (entry.domain || '').toLowerCase().indexOf(text) === -1) return false;
      if (type && entry.type !== type) return false;
      if (action && entry.action !== action) return false;
      return true;
    }

    function renderEntries() {
      var filtered = entries.filter(matchesFilter);
      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        logBody.innerHTML = '';
        return;
      }
      emptyState.style.display = 'none';

      // Only render last 500 for perf
      var toShow = filtered.slice(-500);
      var html = '';
      for (var i = toShow.length - 1; i >= 0; i--) {
        var e = toShow[i];
        var rowClass = (e.action === 'blocked' || e.action === 'block') ? 'blocked' :
                       (e.action === 'allowed' || e.action === 'allow') ? 'allowed' :
                       (e.action === 'redirected' || e.action === 'redirect') ? 'redirected' : '';
        html += '<tr class="' + rowClass + '">' +
          '<td>' + formatTime(e.timestamp || e.time || Date.now()) + '</td>' +
          '<td>' + actionBadge(e.action) + '</td>' +
          '<td>' + (e.type || '-') + '</td>' +
          '<td title="' + (e.domain || '') + '">' + (e.domain || getDomain(e.url)) + '</td>' +
          '<td title="' + (e.url || '') + '">' + (e.url || '-') + '</td>' +
          '<td>' + (e.rule || e.ruleId || '-') + '</td>' +
          '</tr>';
      }
      logBody.innerHTML = html;

      // Update stats
      var blocked = 0, allowed = 0, redirected = 0;
      entries.forEach(function (e) {
        if (e.action === 'blocked' || e.action === 'block') blocked++;
        else if (e.action === 'redirected' || e.action === 'redirect') redirected++;
        else allowed++;
      });
      document.getElementById('statTotal').textContent = entries.length;
      document.getElementById('statBlocked').textContent = blocked;
      document.getElementById('statAllowed').textContent = allowed;
      document.getElementById('statRedirected').textContent = redirected;
    }

    function poll() {
      if (!recording) return;
      sendMsg({ action: 'getLoggerUI' }).then(function (data) {
        if (!data) return;
        if (data.entries && data.entries.length > 0) {
          entries = data.entries.slice(-maxEntries);
          renderEntries();
        }
      });
    }

    // Enable logger on open
    sendMsg({ action: 'enableNetworkLogger' });
    poll();
    setInterval(poll, 1500);

    toggleBtn.addEventListener('click', function () {
      recording = !recording;
      if (recording) {
        toggleBtn.textContent = '● Recording';
        toggleBtn.classList.add('active');
        sendMsg({ action: 'enableNetworkLogger' });
      } else {
        toggleBtn.textContent = '○ Paused';
        toggleBtn.classList.remove('active');
        sendMsg({ action: 'disableNetworkLogger' });
      }
    });

    clearBtn.addEventListener('click', function () {
      entries = [];
      renderEntries();
      sendMsg({ action: 'clearNetworkLog' });
    });

    filterInput.addEventListener('input', renderEntries);
    typeFilter.addEventListener('change', renderEntries);
    actionFilter.addEventListener('change', renderEntries);
  })();
  </script>
</body>
</html>
