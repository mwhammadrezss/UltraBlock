<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UltraBlock — Profiles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; padding: 24px; min-height: 100vh;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #8b949e; margin-bottom: 24px; }

    .profiles-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .profile-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 20px; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .profile-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
    .profile-card.active { border-color: #3fb950; box-shadow: 0 0 12px rgba(63,185,80,0.15); }
    .profile-card.active::after {
      content: '✓ Active'; position: absolute; top: 12px; right: 12px;
      font-size: 11px; background: #238636; color: #fff;
      padding: 2px 8px; border-radius: 10px;
    }
    .profile-icon { font-size: 32px; margin-bottom: 12px; }
    .profile-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .profile-desc { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
    .profile-rules {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .rule-chip {
      font-size: 10px; padding: 3px 8px; border-radius: 10px;
      background: #21262d; color: #8b949e;
    }
    .rule-chip.on { background: rgba(56,211,100,0.1); color: #3fb950; }
    .rule-chip.off { background: rgba(248,81,73,0.1); color: #f85149; }

    .add-profile {
      background: #161b22; border: 2px dashed #30363d; border-radius: 10px;
      padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .add-profile:hover { border-color: #58a6ff; }
    .add-profile .icon { font-size: 28px; margin-bottom: 8px; }
    .add-profile .label { font-size: 14px; color: #8b949e; }

    .section { margin-top: 32px; }
    .section h2 { font-size: 16px; margin-bottom: 12px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; max-width: 400px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 8px 12px; color: #e6edf3; font-size: 13px;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #58a6ff; }

    .actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid #30363d; transition: all 0.2s;
    }
    .btn-primary { background: #238636; border-color: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #c9d1d9; }
    .btn-danger { background: transparent; color: #f85149; border-color: #f85149; }

    #create-form { display: none; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>👤 Filtering Profiles</h1>
  <p class="subtitle">Switch between different filtering configurations for different contexts</p>

  <div class="profiles-grid" id="profiles-grid"></div>

  <div id="create-form">
    <h2>Create New Profile</h2>
    <div class="form-group">
      <label>Profile Name</label>
      <input type="text" id="new-name" placeholder="e.g. Work, Kids, Strict">
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="new-icon" placeholder="🛡️" maxlength="2">
    </div>
    <div class="form-group">
      <label>Base Template</label>
      <select id="new-template">
        <option value="default">Default (Standard blocking)</option>
        <option value="strict">Strict (Block everything suspicious)</option>
        <option value="light">Light (Only block ads, allow trackers)</option>
        <option value="kids">Kids (Block ads + adult + social)</option>
        <option value="work">Work (Block ads + social + entertainment)</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-create">Create</button>
      <button class="btn btn-secondary" id="btn-cancel-create">Cancel</button>
    </div>
  </div>

  <script src="profiles.js"></script>
</body>
</html>
